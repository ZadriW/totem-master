{#
    Sub-navegação interna de cada página de evento.
    Requer: event, active_event_tab
#}
<nav class="admin-event-subnav" aria-label="Seções do evento">
    <a class="admin-event-subnav__item {% if active_event_tab == 'dashboard' %}is-active{% endif %}"
       href="{{ url_for('admin_event_detail', event_id=event.id) }}">
        <i class="fa-solid fa-gauge-high" aria-hidden="true"></i>
        <span>Dashboard</span>
    </a>
    <a class="admin-event-subnav__item {% if active_event_tab == 'estoque' %}is-active{% endif %}"
       href="{{ url_for('admin_event_stock', event_id=event.id) }}">
        <i class="fa-solid fa-boxes-stacked" aria-hidden="true"></i>
        <span>Estoque</span>
    </a>
    <a class="admin-event-subnav__item {% if active_event_tab == 'movimentacoes' %}is-active{% endif %}"
       href="{{ url_for('admin_event_movements', event_id=event.id) }}">
        <i class="fa-solid fa-right-left" aria-hidden="true"></i>
        <span>Movimentações</span>
    </a>
    <a class="admin-event-subnav__item {% if active_event_tab == 'vendedores' %}is-active{% endif %}"
       href="{{ url_for('admin_event_sellers', event_id=event.id) }}">
        <i class="fa-solid fa-users" aria-hidden="true"></i>
        <span>Vendedores</span>
    </a>
</nav>
