{# Logo Odonto Master — alterna entre claro (logo-master) e escuro (logo-branca) via CSS. #}
{% macro admin_brand_logo(extra_class='') -%}
<img
    class="admin-brand-logo admin-brand-logo--light{% if extra_class %} {{ extra_class }}{% endif %}"
    src="{{ url_for('static', filename='images/logo-master.png') }}"
    alt="Odonto Master"
>
<img
    class="admin-brand-logo admin-brand-logo--dark{% if extra_class %} {{ extra_class }}{% endif %}"
    src="{{ url_for('static', filename='images/logo-branca.png') }}"
    alt="Odonto Master"
>
{%- endmacro %}
