{# Coluna do código do pedido + copiar (histórico admin-tx). #}
{% macro admin_tx_order_cell(order_number) -%}
<span class="admin-table__col admin-tx__order">
    <span class="admin-tx__order-inner">
        <strong>#{{ order_number }}</strong>
        <span
            class="admin-tx__copy-order"
            role="button"
            tabindex="0"
            data-copy-order="{{ order_number }}"
            title="Copiar código do pedido"
            aria-label="Copiar código do pedido {{ order_number }}"
        >
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
        </span>
    </span>
</span>
{%- endmacro %}
