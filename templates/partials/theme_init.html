{# Bootstrap do modo escuro antes do paint — escopo por login (admin vs vendedor). #}
{% if totem_theme_scope %}
<script>
(function () {
    var scope = {{ totem_theme_scope | tojson }};
    window.__TOTEM_THEME_SCOPE__ = scope;
    try {
        var key = 'totem-theme:' + scope;
        var theme = localStorage.getItem(key);
        if (theme === null && scope.indexOf('admin:') === 0) {
            var legacy = localStorage.getItem('totem-admin-theme');
            if (legacy === 'dark' || legacy === 'light') {
                theme = legacy;
                localStorage.setItem(key, theme);
            }
        }
        if (theme === 'dark') {
            document.documentElement.classList.add('admin-theme--dark');
        }
    } catch (e) { /* ignore */ }
})();
</script>
{% endif %}
